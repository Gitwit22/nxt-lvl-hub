services:
  - type: web
    name: nxt-lvl-hub
    env: node
    plan: free
    buildCommand: npm install && npm run build && npm run build:server
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://ntlops.com,https://nltops.com,https://www.ntlops.com,https://www.nltops.com
      - key: VITE_API_BASE_URL
        value: https://nxt-lvl-hub.onrender.com
      - key: UPLOAD_PATH
        value: backend/uploads
      - key: VITE_SUITE_URL
        value: https://ntlops.com
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: PLATFORM_SETUP_TOKEN
        sync: false